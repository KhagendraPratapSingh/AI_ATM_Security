<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Find Missing Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#121212;color:white;}</style>
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card bg-dark border-secondary shadow-lg">
                <div class="card-body">
                    <h2 class="text-center mb-4">🔍 Asset Search</h2>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Select Missing Item</label>
                            <select name="item_name" class="form-select bg-secondary text-white">
                                <option value="Mouse">Computer Mouse</option>
                                <option value="Laptop">Laptop</option>
                                <option value="Phone">Mobile Phone</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Locate Item</button>
                    </form>

                    {% if result %}
                    <div class="alert alert-info mt-4 text-center">
                        <h5>{{ result }}</h5>
                    </div>
                    {% endif %}

                    {% if image %}
                    <div class="mt-3 text-center">
                        <h5 class="text-warning">📸 Photographic Evidence:</h5>
                        <img src="{{ url_for('static', filename='evidence/' + image) }}" class="img-fluid border border-white" style="max-height: 300px;">
                    </div>
                    {% endif %}

                    <div class="mt-3 text-center">
                        <a href="/dashboard" class="text-decoration-none text-light">← Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
