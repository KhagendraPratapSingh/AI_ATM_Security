<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Database Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white container mt-5">
    <h2 class="text-center mb-4">📂 System Database</h2>
    
    <div class="row">
        <div class="col-md-6">
            <h4 class="text-danger">⚠️ Threat History</h4>
            <div class="card bg-secondary">
                <table class="table table-dark table-striped mb-0">
                    <thead><tr><th>ID</th><th>Time</th><th>Event</th></tr></thead>
                    <tbody>
                        {% for row in threats %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                            <td>{{ row[2] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

        <div class="col-md-6">
            <h4 class="text-info">📦 Asset Tracking</h4>
            <div class="card bg-secondary">
                <table class="table table-dark table-striped mb-0">
                    <thead><tr><th>ID</th><th>Time</th><th>Item</th><th>Seen With</th></tr></thead>
                    <tbody>
                        {% for row in assets %}
                        <tr>
                            <td>{{ row[0] }}</td>
                            <td>{{ row[1] }}</td>
                            <td>{{ row[2] }}</td>
                            <td>{{ row[3] }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-4">
        <a href="/dashboard" class="btn btn-primary btn-lg">Back to Dashboard</a>
    </div>
</body>
</html>
