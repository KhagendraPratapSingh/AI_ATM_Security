<!DOCTYPE html>
<html>
<head>
    <title>Security Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #222; padding: 40px; border-radius: 10px; border: 1px solid #444; text-align: center; }
        input { margin: 10px 0; padding: 10px; width: 100%; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #0d6efd; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0b5ed7; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔒 RESTRICTED AREA</h2>
        <p class="text-secondary">Authorized Personnel Only</p>
        <form method="post">
            <input type="text" name="username" placeholder="Username" required><br>
            <input type="password" name="password" placeholder="Password" required><br>
            <button type="submit">ACCESS SYSTEM</button>
        </form>
    </div>
</body>
</html>
